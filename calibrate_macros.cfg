# ============================================================================
# eddy-ng Calibration Macros — Complete 7-Step Workflow
# ============================================================================
#
# Include in printer.cfg:
#   [include calibrate_macros.cfg]
#
# Run the macros in order. After each SAVE_CONFIG restart, Klipper tells
# you which macro to run next. Steps 1-4 are the required base calibration.
# Steps 5-7 are optional advanced calibration for best accuracy.
#
# Required base calibration:
#   Step 1: EDDY_NG_SETUP_1VON7               (manual Z positioning)
#   Step 2: EDDY_NG_OPTIMIZE_DC_2VON7         (automatic, ~2 min)
#   Step 3: EDDY_NG_CALIBRATE_THRESHOLD_3VON7 (automatic, ~2 min)
#   Step 4: EDDY_NG_VERIFY_4VON7              (automatic verification)
#
# Optional advanced calibration:
#   Step 5: EDDY_NG_TEMP_CALIBRATE_5VON7      (30-60 min, requires scipy)
#   Step 6: EDDY_NG_AXIS_TWIST_6VON7          (automatic, ~6 min)
#   Step 7: EDDY_NG_BACKLASH_7VON7            (automatic, ~2 min)
#
# After completing all steps, you can remove this include.
# ============================================================================


# ── User Settings ───────────────────────────────────────────────────────────
# Edit these defaults to match your printer and print conditions.
# You can still override any value via macro parameter, e.g.:
#   EDDY_NG_TEMP_CALIBRATE_5VON7 BED_TEMP=110
# If no parameter is given, the values below are used.
[gcode_macro _EDDY_NG_SETTINGS]
description: Default settings for eddy-ng calibration (edit to match your printer)

# --- Temperature Compensation (Step 5) ---
# Bed temperature during calibration (should match your typical print temp)
variable_bed_temp: 90
# Sensor temperature range to measure
variable_min_temp: 40
variable_max_temp: 60
# Use hotend fan for faster cooling (1=on, 0=off)
# Heats hotend to 80C to trigger heater_fan during cooldown phases
variable_hotend_fan: 0

# --- Axis Twist Compensation (Step 6) ---
# Axis to calibrate: X, Y, or BOTH
variable_twist_axis: "BOTH"
# Points per axis (more = more accurate, slower)
variable_twist_sample_count: 7
# Bed/hotend temperature for twist calibration (0 = cold calibration)
# Calibrating at print temperature gives best results because the
# gantry expands under heat — twist measured cold may differ.
variable_twist_bed_temp: 0
# Hotend temperature (max 150 recommended to avoid ooze)
variable_twist_hotend_temp: 0

gcode:
    RESPOND MSG="eddy-ng calibration settings:"
    RESPOND MSG="  Temp cal: BED_TEMP={printer['gcode_macro _EDDY_NG_SETTINGS'].bed_temp} MIN_TEMP={printer['gcode_macro _EDDY_NG_SETTINGS'].min_temp} MAX_TEMP={printer['gcode_macro _EDDY_NG_SETTINGS'].max_temp} HOTEND_FAN={printer['gcode_macro _EDDY_NG_SETTINGS'].hotend_fan}"
    RESPOND MSG="  Axis twist: AXIS={printer['gcode_macro _EDDY_NG_SETTINGS'].twist_axis} BED_TEMP={printer['gcode_macro _EDDY_NG_SETTINGS'].twist_bed_temp} HOTEND_TEMP={printer['gcode_macro _EDDY_NG_SETTINGS'].twist_hotend_temp} SAMPLES={printer['gcode_macro _EDDY_NG_SETTINGS'].twist_sample_count}"


# ── Step 1/7: Initial Sensor Setup ──────────────────────────────────────────
# Homes XY, moves nozzle to bed center, starts manual Z probe.
# YOU must lower the nozzle with TESTZ until it barely touches the bed,
# then type ACCEPT. After that, type SAVE_CONFIG.
# After Klipper restarts, run: EDDY_NG_OPTIMIZE_DC_2VON7
[gcode_macro EDDY_NG_SETUP_1VON7]
description: Calibration 1/7: Initial sensor setup (manual Z required)
gcode:
    M117 Calibration 1/7: Setup
    RESPOND MSG="=== eddy-ng Calibration Step 1/7: Initial Setup ==="
    RESPOND MSG="After homing, lower the nozzle with TESTZ until it barely touches the bed."
    RESPOND MSG="Then type ACCEPT, followed by SAVE_CONFIG."
    RESPOND MSG="After restart, run: EDDY_NG_OPTIMIZE_DC_2VON7"
    G28 X Y
    PROBE_EDDY_NG_SETUP


# ── Step 2/7: Optimize Drive Current ────────────────────────────────────────
# Fully automatic. Tests drive currents around the initial value.
# Takes ~2 minutes. Saves and restarts automatically.
# After Klipper restarts, run: EDDY_NG_CALIBRATE_THRESHOLD_3VON7
[gcode_macro EDDY_NG_OPTIMIZE_DC_2VON7]
description: Calibration 2/7: Optimize drive current (~2 min, automatic)
gcode:
    M117 Calibration 2/7: Drive Current
    RESPOND MSG="=== eddy-ng Calibration Step 2/7: Optimize Drive Current ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    PROBE_EDDY_NG_OPTIMIZE_DRIVE_CURRENT
    RESPOND MSG="Step 2/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_CALIBRATE_THRESHOLD_3VON7"
    SAVE_CONFIG


# ── Step 3/7: Calibrate Tap Threshold ───────────────────────────────────────
# Fully automatic. Finds the optimal tap sensitivity.
# Takes ~2 minutes. Saves and restarts automatically.
# After Klipper restarts, run: EDDY_NG_VERIFY_4VON7
[gcode_macro EDDY_NG_CALIBRATE_THRESHOLD_3VON7]
description: Calibration 3/7: Calibrate tap threshold (~2 min, automatic)
gcode:
    M117 Calibration 3/7: Threshold
    RESPOND MSG="=== eddy-ng Calibration Step 3/7: Calibrate Tap Threshold ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    PROBE_EDDY_NG_CALIBRATE_THRESHOLD
    RESPOND MSG="Step 3/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_VERIFY_4VON7"
    SAVE_CONFIG


# ── Step 4/7: Verification ──────────────────────────────────────────────────
# Tests homing, tap, and probe accuracy to verify the base calibration.
# After this step, the probe is ready for basic use.
# For advanced calibration, continue with steps 5-7.
[gcode_macro EDDY_NG_VERIFY_4VON7]
description: Calibration 4/7: Verify homing, tap, and probe accuracy
gcode:
    M117 Calibration 4/7: Verify
    RESPOND MSG="=== eddy-ng Calibration Step 4/7: Verification ==="
    G28
    RESPOND MSG="Testing tap..."
    PROBE_EDDY_NG_TAP
    RESPOND MSG="Testing probe accuracy (10 samples)..."
    PROBE_EDDY_NG_PROBE_ACCURACY
    RESPOND MSG="=== Base calibration complete! Probe is ready for basic use. ==="
    RESPOND MSG="Optional: Continue with EDDY_NG_TEMP_CALIBRATE_5VON7 for advanced calibration."
    M117 Base calibration complete!


# ── Step 5/7: Temperature Compensation ──────────────────────────────────────
# Heats the bed and measures sensor drift across temperatures at multiple
# heights. Builds a quadratic compensation model. Requires scipy.
# Takes 30-60 minutes depending on bed size and cooling speed.
#
# Parameters (override settings, or omit to use defaults from _EDDY_NG_SETTINGS):
#   BED_TEMP   : Bed temperature (default from settings)
#   MIN_TEMP   : Minimum sensor temp to measure
#   MAX_TEMP   : Maximum sensor temp to measure
#   HOTEND_FAN : 1 = use hotend fan for faster cooling, 0 = off
#
# Examples:
#   EDDY_NG_TEMP_CALIBRATE_5VON7
#   EDDY_NG_TEMP_CALIBRATE_5VON7 BED_TEMP=110 HOTEND_FAN=1
[gcode_macro EDDY_NG_TEMP_CALIBRATE_5VON7]
description: Calibration 5/7: Temperature compensation (30-60 min, requires scipy)
gcode:
    {% set s = printer["gcode_macro _EDDY_NG_SETTINGS"] %}
    {% set bed_temp = params.BED_TEMP|default(s.bed_temp)|float %}
    {% set min_temp = params.MIN_TEMP|default(s.min_temp)|float %}
    {% set max_temp = params.MAX_TEMP|default(s.max_temp)|float %}
    {% set hotend_fan = params.HOTEND_FAN|default(s.hotend_fan)|int %}
    M117 Calibration 5/7: Temp Comp
    RESPOND MSG="=== eddy-ng Calibration Step 5/7: Temperature Compensation ==="
    RESPOND MSG="BED_TEMP={bed_temp} MIN_TEMP={min_temp} MAX_TEMP={max_temp} HOTEND_FAN={hotend_fan}"
    RESPOND MSG="This takes 30-60 minutes. Do not touch the printer."
    G28
    QUAD_GANTRY_LEVEL
    PROBE_EDDY_NG_TEMPERATURE_CALIBRATE BED_TEMP={bed_temp} MIN_TEMP={min_temp} MAX_TEMP={max_temp} HOTEND_FAN={hotend_fan}
    RESPOND MSG="Step 5/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_AXIS_TWIST_6VON7"
    SAVE_CONFIG


# ── Step 6/7: Axis Twist Compensation ───────────────────────────────────────
# Taps at multiple points along X and/or Y axis to measure gantry twist.
# Fully automatic using tap. Requires [axis_twist_compensation] in printer.cfg.
#
# Best results at print temperature — the gantry expands under heat, so
# twist measured cold may differ from twist at operating temperature.
#
# Parameters (override settings, or omit to use defaults from _EDDY_NG_SETTINGS):
#   AXIS         : X, Y, or BOTH
#   SAMPLE_COUNT : Points per axis
#   BED_TEMP     : Bed temperature (0 = cold)
#   HOTEND_TEMP  : Hotend temperature (0 = cold, max 150 recommended)
#
# Examples:
#   EDDY_NG_AXIS_TWIST_6VON7
#   EDDY_NG_AXIS_TWIST_6VON7 BED_TEMP=60 HOTEND_TEMP=150
[gcode_macro EDDY_NG_AXIS_TWIST_6VON7]
description: Calibration 6/7: Axis twist compensation via tap (~6 min)
gcode:
    {% set s = printer["gcode_macro _EDDY_NG_SETTINGS"] %}
    {% set axis = params.AXIS|default(s.twist_axis)|upper %}
    {% set samples = params.SAMPLE_COUNT|default(s.twist_sample_count)|int %}
    {% set bed_temp = params.BED_TEMP|default(s.twist_bed_temp)|float %}
    {% set hotend_temp = params.HOTEND_TEMP|default(s.twist_hotend_temp)|float %}
    M117 Calibration 6/7: Axis Twist ({axis})
    RESPOND MSG="=== eddy-ng Calibration Step 6/7: Axis Twist Compensation ==="
    RESPOND MSG="AXIS={axis} SAMPLE_COUNT={samples} BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp}"
    G28
    QUAD_GANTRY_LEVEL
    G28 Z
    PROBE_EDDY_NG_AXIS_TWIST_CALIBRATE AXIS={axis} SAMPLE_COUNT={samples} BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp}
    RESPOND MSG="Step 6/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_BACKLASH_7VON7"
    SAVE_CONFIG


# ── Step 7/7: Backlash Estimation ───────────────────────────────────────────
# Measures Z-axis backlash by probing up and down repeatedly with
# statistical analysis (Welch's t-test). Saves the compensation value.
# Takes ~2 minutes.
[gcode_macro EDDY_NG_BACKLASH_7VON7]
description: Calibration 7/7: Z-axis backlash estimation (~2 min, automatic)
gcode:
    M117 Calibration 7/7: Backlash
    RESPOND MSG="=== eddy-ng Calibration Step 7/7: Backlash Estimation ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    QUAD_GANTRY_LEVEL
    G28 Z
    PROBE_EDDY_NG_ESTIMATE_BACKLASH CALIBRATE=1
    RESPOND MSG="Step 7/7 complete. Saving..."
    RESPOND MSG="=== eddy-ng Full Calibration Complete! ==="
    RESPOND MSG="Your probe is fully calibrated. You can remove [include calibrate_macros.cfg]."
    SAVE_CONFIG


# ── Quick Reference ─────────────────────────────────────────────────────────
# Show current settings:
#   _EDDY_NG_SETTINGS
#
# Run individual steps or start from any point:
#   EDDY_NG_SETUP_1VON7                           Step 1: Initial setup
#   EDDY_NG_OPTIMIZE_DC_2VON7                     Step 2: Drive current
#   EDDY_NG_CALIBRATE_THRESHOLD_3VON7             Step 3: Tap threshold
#   EDDY_NG_VERIFY_4VON7                          Step 4: Verification
#   EDDY_NG_TEMP_CALIBRATE_5VON7                  Step 5: Temp comp
#   EDDY_NG_AXIS_TWIST_6VON7                      Step 6: Axis twist
#   EDDY_NG_BACKLASH_7VON7                        Step 7: Backlash
#
# Or start the full base calibration:
#   EDDY_NG_CALIBRATE_ALL
# ────────────────────────────────────────────────────────────────────────────


# ── All-in-One (base calibration only) ──────────────────────────────────────
# Starts the base calibration (steps 1-4). After manual Z + ACCEPT +
# SAVE_CONFIG, you still need to run steps 2-4 manually after each restart.
# For fully unattended calibration (except manual Z), use:
#   ~/eddy-ng/scripts/calibrate.sh
[gcode_macro EDDY_NG_CALIBRATE_ALL]
description: Start full eddy-ng base calibration (steps 1-4)
gcode:
    EDDY_NG_SETUP_1VON7
