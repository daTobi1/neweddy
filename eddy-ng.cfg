# ============================================================================
# eddy-ng.cfg – BTT Eddy via CAN bus
#
# Einbinden in printer.cfg:
#   [include eddy-ng.cfg]
#
# Ersteinrichtung:
#   1. Klipper neustarten
#   2. G28 X Y
#   3. PROBE_EDDY_NG_SETUP
#   4. SAVE_CONFIG
#   5. PROBE_EDDY_NG_OPTIMIZE_DRIVE_CURRENT
#   6. SAVE_CONFIG
#   7. PROBE_EDDY_NG_CALIBRATE_THRESHOLD
#   8. SAVE_CONFIG
# ============================================================================

# ── Eddy MCU (CAN) ────────────────────────────────────────────────────────
[mcu eddy]
canbus_uuid: eb13a45c89c8

# ── Eddy-NG Probe ─────────────────────────────────────────────────────────
[probe_eddy_ng my_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 0.0
y_offset: 16.0

# Tap-Erkennung
tap_mode: butter
tap_speed: 3.0
tap_start_z: 3.0
tap_target_z: -0.250

# Tap-Sampling
tap_samples: 3
tap_max_samples: 5
tap_samples_stddev: 0.020

# Scanning / Bed Mesh
scan_sample_time: 0.100
scan_sample_time_delay: 0.050
mesh_path: snake
mesh_direction: x
mesh_runs: 1
mesh_height: 3.0

# Z Homing
home_trigger_height: 2.0

# Geschwindigkeiten
probe_speed: 5.0
lift_speed: 10.0
move_speed: 50.0

# Kalibrierung
calibration_z_max: 15.0
calibration_points: 150

# Debug (nach Ersteinrichtung auf False setzen)
debug: True

# ── Temperaturueberwachung ─────────────────────────────────────────────────
[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

# ── Z Homing ──────────────────────────────────────────────────────────────
[safe_z_home]
home_xy_position: 175, 150
speed: 100
z_hop: 10
z_hop_speed: 10

# ── Bed Mesh ──────────────────────────────────────────────────────────────
[bed_mesh]
zero_reference_position: 175, 150
speed: 200
horizontal_move_z: 3.5
mesh_min: 20, 30
mesh_max: 320, 270
probe_count: 9, 9
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0
adaptive_margin: 10

# ── Quad Gantry Level ─────────────────────────────────────────────────────
[quad_gantry_level]
gantry_corners:
    -60,-10
    410,420
points:
    20,25
    20,275
    325,275
    325,25
speed: 200
horizontal_move_z: 3
max_adjust: 60
retries: 10
retry_tolerance: 0.005

# ============================================================================
# Makros
# ============================================================================

# ── QGL Wrapper: 2-stufig (coarse + fine) ─────────────────────────────────
[gcode_macro QUAD_GANTRY_LEVEL]
description: 2-stufiges QGL (coarse @10mm, fine @3mm)
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
  {% set coarse_z   = params.COARSE_Z|default(10.0)|float %}
  {% set fine_z     = params.FINE_Z|default(3.0)|float %}
  {% set coarse_tol = params.COARSE_TOL|default(0.05)|float %}
  {% set fine_tol   = params.FINE_TOL|default(0.005)|float %}
  {% set coarse_r   = params.COARSE_RETRIES|default(10)|int %}
  {% set fine_r     = params.FINE_RETRIES|default(10)|int %}

  {% if params.RAW|default(0)|int == 1 %}
    _QUAD_GANTRY_LEVEL
  {% else %}
    {% set homed = printer.toolhead.homed_axes %}
    {% if 'x' not in homed or 'y' not in homed %}
      G28 X Y
    {% endif %}

    {% if 'z' in homed %}
      G90
      G0 Z{coarse_z} F1000
    {% endif %}

    M117 QGL coarse
    _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z={coarse_z} RETRY_TOLERANCE={coarse_tol} RETRIES={coarse_r}

    G90
    G0 Z{coarse_z} F1000

    M117 QGL fine
    _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z={fine_z} RETRY_TOLERANCE={fine_tol} RETRIES={fine_r}

    M117 QGL done
  {% endif %}

# ── Homing Routine ────────────────────────────────────────────────────────
[gcode_macro HOMING_ROUTINE]
description: Vollstaendiges Homing: XY -> QGL -> Z Tap -> Mesh
gcode:
  ENSURE_TOOL_MOUNTED

  {% set cfg = printer.configfile.settings %}
  {% if 'probe_eddy_ng my_eddy' in cfg %}
    {% set px = cfg['probe_eddy_ng my_eddy'].x_offset|default(0.0)|float %}
    {% set py = cfg['probe_eddy_ng my_eddy'].y_offset|default(0.0)|float %}
  {% elif 'probe' in cfg %}
    {% set px = cfg.probe.x_offset|default(0.0)|float %}
    {% set py = cfg.probe.y_offset|default(0.0)|float %}
  {% else %}
    {% set px = 0.0 %}
    {% set py = 0.0 %}
  {% endif %}

  {% set axmin = printer.toolhead.axis_minimum %}
  {% set axmax = printer.toolhead.axis_maximum %}
  {% set bed_min_x = (0.0 if axmin.x < 0 else axmin.x)|float %}
  {% set bed_min_y = (0.0 if axmin.y < 0 else axmin.y)|float %}
  {% set bed_max_x = axmax.x|float %}
  {% set bed_max_y = axmax.y|float %}
  {% set cx = ((bed_min_x + bed_max_x) / 2.0 - px)|float %}
  {% set cy = ((bed_min_y + bed_max_y) / 2.0 - py)|float %}

  # 1) Home XYZ
  SET_GCODE_OFFSET Z=0
  G28
  G90

  # 2) QGL (2-stufig)
  QUAD_GANTRY_LEVEL

  # 3) Z fein via Tap an Bettmitte
  CLEAN_NOZZLE
  G1 Z10 F5000
  G1 X{ '%.3f' % cx } Y{ '%.3f' % cy } F5000
  PROBE_EDDY_NG_TAP
  G0 Z3 F5000

  # 4) Bed Mesh
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE

  # 5) Zurueck zur Mitte
  G1 X{ '%.3f' % cx } Y{ '%.3f' % cy } F2000

# ── Print Start ───────────────────────────────────────────────────────────
[gcode_macro PRINT_START]
description: Aufheizen, Homing, Tap, Mesh, Druckstart
gcode:
  {% set bed_temp = params.BED_TEMP|default(60)|float %}
  {% set extruder_temp = params.EXTRUDER_TEMP|default(200)|float %}

  # Home alle Achsen
  G28

  # Bett aufheizen und warten
  M190 S{bed_temp}

  # Duese auf 150C (kein Oozing, kein Druckbettschaden)
  M109 S150

  # QGL
  QUAD_GANTRY_LEVEL

  # Praeziser Z-Offset via Tap bei Drucktemperatur
  PROBE_EDDY_NG_TAP

  # Temperaturkompensiertes Bed Mesh
  BED_MESH_CALIBRATE

  # Volle Duesentemperatur
  M109 S{extruder_temp}

  # Bereit zum Drucken
  G0 Z5 F3000

# ── Utility ───────────────────────────────────────────────────────────────
[gcode_macro ENSURE_TOOL_MOUNTED]
description: Laedt T0, falls kein Tool aktiv ist
gcode:
  {% if not printer.toolhead.extruder %}
    T0
  {% endif %}
