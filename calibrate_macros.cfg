# ============================================================================
# eddy-ng Calibration Macros
# ============================================================================
#
# Include in printer.cfg:
#   [include calibrate_macros.cfg]
#
# Run the macros in order. After each SAVE_CONFIG restart, Klipper tells
# you which macro to run next.
#
# Step 1: EDDY_NG_CALIBRATE_1VON4  (manual Z positioning required)
# Step 2: EDDY_NG_CALIBRATE_2VON4  (automatic, ~2 min)
# Step 3: EDDY_NG_CALIBRATE_3VON4  (automatic, ~2 min)
# Step 4: EDDY_NG_CALIBRATE_4VON4  (automatic verification)
#
# Or run everything at once (only pauses for manual Z):
#   EDDY_NG_CALIBRATE_ALL
#
# After completing all 4 steps, you can remove this include.
# ============================================================================

# ── Step 1/4: Initial Sensor Setup ────────────────────────────────────────
# Homes XY, moves nozzle to bed center, starts manual Z probe.
# YOU must lower the nozzle with TESTZ until it barely touches the bed,
# then type ACCEPT. After that, type SAVE_CONFIG.
# After Klipper restarts, run: EDDY_NG_CALIBRATE_2VON4
[gcode_macro EDDY_NG_CALIBRATE_1VON4]
description: Calibration 1/4: Initial sensor setup (manual Z required)
gcode:
    M117 Calibration 1/4: Setup
    RESPOND MSG="=== eddy-ng Calibration Step 1/4: Initial Setup ==="
    RESPOND MSG="After homing, lower the nozzle with TESTZ until it barely touches the bed."
    RESPOND MSG="Then type ACCEPT, followed by SAVE_CONFIG."
    RESPOND MSG="After restart, run: EDDY_NG_CALIBRATE_2VON4"
    G28 X Y
    PROBE_EDDY_NG_SETUP

# ── Step 2/4: Optimize Drive Current ─────────────────────────────────────
# Fully automatic. Tests drive currents around the initial value.
# Takes ~2 minutes. Saves and restarts automatically.
# After Klipper restarts, run: EDDY_NG_CALIBRATE_3VON4
[gcode_macro EDDY_NG_CALIBRATE_2VON4]
description: Calibration 2/4: Optimize drive current (~2 min, automatic)
gcode:
    M117 Calibration 2/4: Drive Current
    RESPOND MSG="=== eddy-ng Calibration Step 2/4: Optimize Drive Current ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    PROBE_EDDY_NG_OPTIMIZE_DRIVE_CURRENT
    RESPOND MSG="Step 2/4 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_CALIBRATE_3VON4"
    SAVE_CONFIG

# ── Step 3/4: Calibrate Tap Threshold ────────────────────────────────────
# Fully automatic. Finds the optimal tap sensitivity.
# Takes ~2 minutes. Saves and restarts automatically.
# After Klipper restarts, run: EDDY_NG_CALIBRATE_4VON4
[gcode_macro EDDY_NG_CALIBRATE_3VON4]
description: Calibration 3/4: Calibrate tap threshold (~2 min, automatic)
gcode:
    M117 Calibration 3/4: Threshold
    RESPOND MSG="=== eddy-ng Calibration Step 3/4: Calibrate Tap Threshold ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    PROBE_EDDY_NG_CALIBRATE_THRESHOLD
    RESPOND MSG="Step 3/4 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: EDDY_NG_CALIBRATE_4VON4"
    SAVE_CONFIG

# ── Step 4/4: Verification ───────────────────────────────────────────────
# Tests homing, tap, and probe accuracy to verify everything works.
[gcode_macro EDDY_NG_CALIBRATE_4VON4]
description: Calibration 4/4: Verify homing, tap, and probe accuracy
gcode:
    M117 Calibration 4/4: Verify
    RESPOND MSG="=== eddy-ng Calibration Step 4/4: Verification ==="
    G28
    RESPOND MSG="Testing tap..."
    PROBE_EDDY_NG_TAP
    RESPOND MSG="Testing probe accuracy (10 samples)..."
    PROBE_EDDY_NG_PROBE_ACCURACY
    RESPOND MSG="=== eddy-ng Calibration Complete! ==="
    RESPOND MSG="Your probe is ready to use. You can remove [include calibrate_macros.cfg] from printer.cfg."
    M117 Calibration complete!

# ── Axis Twist Compensation ─────────────────────────────────────────────
# Fully automatic using tap. Probes 7 points along X and/or Y axis.
# Requires [axis_twist_compensation] in printer.cfg (even if empty).
# Saves z_compensations automatically.
#
# Usage:
#   EDDY_NG_AXIS_TWIST_CALIBRATE              (X axis only, default)
#   EDDY_NG_AXIS_TWIST_CALIBRATE AXIS=Y       (Y axis only)
#   EDDY_NG_AXIS_TWIST_CALIBRATE AXIS=BOTH    (X + Y in one run)
[gcode_macro EDDY_NG_AXIS_TWIST_CALIBRATE]
description: Axis twist compensation via tap (fully automatic, ~3 min per axis)
gcode:
    {% set axis = params.AXIS|default("X")|upper %}
    {% set samples = params.SAMPLE_COUNT|default(7)|int %}
    M117 Axis Twist ({axis})
    RESPOND MSG="=== Axis Twist Compensation Calibration (AXIS={axis}) ==="
    RESPOND MSG="This is fully automatic using tap at {samples} points per axis."
    G28
    PROBE_EDDY_NG_AXIS_TWIST_CALIBRATE AXIS={axis} SAMPLE_COUNT={samples}
    RESPOND MSG="Axis twist calibration complete. Saving..."
    SAVE_CONFIG

# ── All-in-One (pauses for manual Z only) ────────────────────────────────
# Starts the full calibration. After manual Z + ACCEPT + SAVE_CONFIG,
# you still need to run steps 2-4 manually after each restart.
# For fully unattended calibration (except manual Z), use:
#   ~/eddy-ng/scripts/calibrate.sh
[gcode_macro EDDY_NG_CALIBRATE_ALL]
description: Start full eddy-ng calibration (begins with step 1/4)
gcode:
    EDDY_NG_CALIBRATE_1VON4
