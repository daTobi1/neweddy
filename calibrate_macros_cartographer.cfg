# ============================================================================
# Cartographer Calibration Macros — Complete 7-Step Workflow
# ============================================================================
#
# Adapted version of the eddy-ng calibration workflow for printers using
# the native Cartographer firmware (v3/v4). Uses Cartographer's own
# calibration commands instead of eddy-ng commands.
#
# Include in printer.cfg:
#   [include calibrate_macros_cartographer.cfg]
#
# Required base calibration:
#   Step 1: CARTO_SCAN_CALIBRATE_1VON7         (automatic, ~2 min)
#   Step 2: CARTO_TOUCH_CALIBRATE_2VON7        (automatic, ~2 min)
#   Step 3: CARTO_VERIFY_3VON7                 (automatic verification)
#
# Optional advanced calibration:
#   Step 4: CARTO_TEMP_CALIBRATE_4VON7         (30-60 min)
#   Step 5: CARTO_AXIS_TWIST_5VON7             (automatic, ~6 min)
#   Step 6: CARTO_BACKLASH_6VON7               (automatic, ~2 min)
#   Step 7: CARTO_FULL_VERIFY_7VON7            (final check)
#
# After completing all steps, you can remove this include.
# ============================================================================


# ── User Settings ───────────────────────────────────────────────────────────
# Edit these defaults to match your printer and print conditions.
# You can still override any value via macro parameter.
[gcode_macro _CARTO_SETTINGS]
description: Default settings for Cartographer calibration (edit to match your printer)

# --- Printer / Gantry Leveling ---
# "QUAD_GANTRY_LEVEL" for Voron 2.4, "Z_TILT_ADJUST" for Trident, "" for none
variable_level_command: "QUAD_GANTRY_LEVEL"

# --- Temperature Compensation (Step 4) ---
variable_bed_temp: 90
variable_min_temp: 40
variable_max_temp: 60

# --- Axis Twist Compensation (Step 5) ---
variable_twist_axis: "BOTH"
variable_twist_sample_count: 7
# Bed/hotend temperature for twist calibration (0 = cold)
variable_twist_bed_temp: 0
variable_twist_hotend_temp: 0

gcode:
    {% set s = printer["gcode_macro _CARTO_SETTINGS"] %}
    RESPOND MSG="Cartographer calibration settings:"
    RESPOND MSG="  Leveling: {s.level_command if s.level_command else 'none'}"
    RESPOND MSG="  Temp cal: BED_TEMP={s.bed_temp} MIN_TEMP={s.min_temp} MAX_TEMP={s.max_temp}"
    RESPOND MSG="  Axis twist: AXIS={s.twist_axis} BED_TEMP={s.twist_bed_temp} HOTEND_TEMP={s.twist_hotend_temp}"


# ── Step 1/7: Scan Calibration ──────────────────────────────────────────────
# Calibrates the frequency-to-height mapping for scanning.
# Fully automatic. Saves and restarts.
# After restart, run: CARTO_TOUCH_CALIBRATE_2VON7
[gcode_macro CARTO_SCAN_CALIBRATE_1VON7]
description: Calibration 1/7: Scan calibration (automatic, ~2 min)
gcode:
    M117 Calibration 1/7: Scan Cal
    RESPOND MSG="=== Cartographer Calibration Step 1/7: Scan Calibration ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    CARTOGRAPHER_SCAN_CALIBRATE
    RESPOND MSG="Step 1/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: CARTO_TOUCH_CALIBRATE_2VON7"
    SAVE_CONFIG


# ── Step 2/7: Touch Calibration ─────────────────────────────────────────────
# Calibrates the touch sensitivity for Z-homing.
# Fully automatic. Saves and restarts.
# After restart, run: CARTO_VERIFY_3VON7
[gcode_macro CARTO_TOUCH_CALIBRATE_2VON7]
description: Calibration 2/7: Touch calibration (automatic, ~2 min)
gcode:
    M117 Calibration 2/7: Touch Cal
    RESPOND MSG="=== Cartographer Calibration Step 2/7: Touch Calibration ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    CARTOGRAPHER_TOUCH_CALIBRATE
    RESPOND MSG="Step 2/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: CARTO_VERIFY_3VON7"
    SAVE_CONFIG


# ── Step 3/7: Verification ──────────────────────────────────────────────────
# Tests homing, touch, and scan accuracy to verify the base calibration.
[gcode_macro CARTO_VERIFY_3VON7]
description: Calibration 3/7: Verify homing, touch, and scan accuracy
gcode:
    M117 Calibration 3/7: Verify
    RESPOND MSG="=== Cartographer Calibration Step 3/7: Verification ==="
    G28
    RESPOND MSG="Testing touch home..."
    CARTOGRAPHER_TOUCH_HOME
    RESPOND MSG="Testing touch accuracy (10 samples)..."
    CARTOGRAPHER_TOUCH_ACCURACY
    RESPOND MSG="Testing scan accuracy..."
    CARTOGRAPHER_SCAN_ACCURACY
    RESPOND MSG="=== Base calibration complete! Probe is ready for basic use. ==="
    RESPOND MSG="Optional: Continue with CARTO_TEMP_CALIBRATE_4VON7 for advanced calibration."
    M117 Base calibration complete!


# ── Step 4/7: Temperature Compensation ──────────────────────────────────────
# Measures sensor drift across temperatures. Requires scipy.
# Takes 30-60 minutes.
#
# Parameters (override settings, or omit to use defaults):
#   BED_TEMP : Bed temperature
#   MIN_TEMP : Minimum sensor temp
#   MAX_TEMP : Maximum sensor temp
[gcode_macro CARTO_TEMP_CALIBRATE_4VON7]
description: Calibration 4/7: Temperature compensation (30-60 min)
gcode:
    {% set s = printer["gcode_macro _CARTO_SETTINGS"] %}
    {% set bed_temp = params.BED_TEMP|default(s.bed_temp)|float %}
    {% set min_temp = params.MIN_TEMP|default(s.min_temp)|float %}
    {% set max_temp = params.MAX_TEMP|default(s.max_temp)|float %}
    M117 Calibration 4/7: Temp Comp
    RESPOND MSG="=== Cartographer Calibration Step 4/7: Temperature Compensation ==="
    RESPOND MSG="BED_TEMP={bed_temp} MIN_TEMP={min_temp} MAX_TEMP={max_temp}"
    RESPOND MSG="This takes 30-60 minutes. Do not touch the printer."
    G28
    {% if s.level_command %}
    {s.level_command}
    {% endif %}
    CARTOGRAPHER_TEMPERATURE_CALIBRATE BED_TEMP={bed_temp} MIN_TEMP={min_temp} MAX_TEMP={max_temp}
    RESPOND MSG="Step 4/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: CARTO_AXIS_TWIST_5VON7"
    SAVE_CONFIG


# ── Step 5/7: Axis Twist Compensation ───────────────────────────────────────
# Uses Cartographer touch to probe multiple points along X and/or Y axis.
# Measures gantry twist and saves compensation values.
# Requires [axis_twist_compensation] in printer.cfg.
#
# Parameters:
#   AXIS         : X, Y, or BOTH (default from settings)
#   SAMPLE_COUNT : Points per axis (default from settings)
#   BED_TEMP     : Bed temperature (0 = cold)
#   HOTEND_TEMP  : Hotend temperature (0 = cold, max 150 recommended)
[gcode_macro CARTO_AXIS_TWIST_5VON7]
description: Calibration 5/7: Axis twist compensation via touch (~6 min)
gcode:
    {% set s = printer["gcode_macro _CARTO_SETTINGS"] %}
    {% set axis = params.AXIS|default(s.twist_axis)|upper %}
    {% set samples = params.SAMPLE_COUNT|default(s.twist_sample_count)|int %}
    {% set bed_temp = params.BED_TEMP|default(s.twist_bed_temp)|float %}
    {% set hotend_temp = params.HOTEND_TEMP|default(s.twist_hotend_temp)|float %}
    M117 Calibration 5/7: Axis Twist ({axis})
    RESPOND MSG="=== Cartographer Calibration Step 5/7: Axis Twist Compensation ==="
    RESPOND MSG="AXIS={axis} SAMPLE_COUNT={samples} BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp}"
    G28
    {% if s.level_command %}
    {s.level_command}
    G28 Z
    {% endif %}
    # Heat to print temperature if requested
    {% if bed_temp > 0 %}
    RESPOND MSG="Heating bed to {bed_temp}C..."
    M190 S{bed_temp}
    {% endif %}
    {% if hotend_temp > 0 %}
    RESPOND MSG="Heating hotend to {hotend_temp}C..."
    M109 S{hotend_temp}
    {% endif %}
    {% if bed_temp > 0 or hotend_temp > 0 %}
    RESPOND MSG="Thermal soak (60s)..."
    G4 P60000
    {% endif %}
    CARTOGRAPHER_AXIS_TWIST_COMPENSATION AXIS={axis} SAMPLE_COUNT={samples}
    # Turn off heaters
    {% if bed_temp > 0 or hotend_temp > 0 %}
    M140 S0
    M104 S0
    {% endif %}
    RESPOND MSG="Step 5/7 complete. Saving and restarting..."
    RESPOND MSG="After restart, run: CARTO_BACKLASH_6VON7"
    SAVE_CONFIG


# ── Step 6/7: Backlash Estimation ───────────────────────────────────────────
# Measures Z-axis backlash with statistical analysis.
# Saves the compensation value. Takes ~2 minutes.
[gcode_macro CARTO_BACKLASH_6VON7]
description: Calibration 6/7: Z-axis backlash estimation (~2 min)
gcode:
    {% set s = printer["gcode_macro _CARTO_SETTINGS"] %}
    M117 Calibration 6/7: Backlash
    RESPOND MSG="=== Cartographer Calibration Step 6/7: Backlash Estimation ==="
    RESPOND MSG="This is fully automatic and takes ~2 minutes."
    G28
    {% if s.level_command %}
    {s.level_command}
    G28 Z
    {% endif %}
    CARTOGRAPHER_ESTIMATE_BACKLASH
    RESPOND MSG="Step 6/7 complete."
    RESPOND MSG="After noting the backlash value, continue with: CARTO_FULL_VERIFY_7VON7"
    M117 Backlash done


# ── Step 7/7: Full Verification ─────────────────────────────────────────────
# Final verification after all calibrations. Tests everything.
[gcode_macro CARTO_FULL_VERIFY_7VON7]
description: Calibration 7/7: Full verification after all calibrations
gcode:
    M117 Calibration 7/7: Final Verify
    RESPOND MSG="=== Cartographer Calibration Step 7/7: Full Verification ==="
    G28
    RESPOND MSG="Testing touch home..."
    CARTOGRAPHER_TOUCH_HOME
    RESPOND MSG="Testing touch accuracy..."
    CARTOGRAPHER_TOUCH_ACCURACY
    RESPOND MSG="Testing scan accuracy..."
    CARTOGRAPHER_SCAN_ACCURACY
    RESPOND MSG="Running bed mesh verification..."
    BED_MESH_CALIBRATE
    RESPOND MSG="=== Full Calibration Complete! ==="
    RESPOND MSG="Your Cartographer probe is fully calibrated."
    RESPOND MSG="You can remove [include calibrate_macros_cartographer.cfg]."
    M117 Full calibration complete!


# ── Quick Reference ─────────────────────────────────────────────────────────
# Show settings:    _CARTO_SETTINGS
#
# Base calibration:
#   CARTO_SCAN_CALIBRATE_1VON7                  Step 1: Scan cal
#   CARTO_TOUCH_CALIBRATE_2VON7                 Step 2: Touch cal
#   CARTO_VERIFY_3VON7                          Step 3: Verify
#
# Advanced calibration:
#   CARTO_TEMP_CALIBRATE_4VON7 BED_TEMP=110     Step 4: Temp comp
#   CARTO_AXIS_TWIST_5VON7 BED_TEMP=60          Step 5: Axis twist
#   CARTO_BACKLASH_6VON7                        Step 6: Backlash
#   CARTO_FULL_VERIFY_7VON7                     Step 7: Final verify
# ────────────────────────────────────────────────────────────────────────────
