# ============================================================================
# eddy-ng example printer.cfg
# ============================================================================
# Copy the relevant sections into your printer.cfg and adjust to your setup.
# Only uncommented options are required -- everything else uses sensible defaults.
# ============================================================================


# ============================================================================
# SENSOR CONFIGURATION
# ============================================================================
# Change "my_eddy" to any name you like. This name is used in GCode commands.

[probe_eddy_ng my_eddy]

# Sensor type -- must match your hardware.
# Options: ldc1612, btt_eddy, cartographer, mellow_fly, ldc1612_internal_clk
sensor_type: btt_eddy

# I2C bus configuration -- adjust to your board and wiring.
# For Eddy Coil (I2C to main MCU):
#   i2c_mcu: mcu
#   i2c_bus: i2c3a
# For Eddy Duo (own RP2040 MCU):
#   i2c_mcu: eddy_duo
#   i2c_bus: i2c0e
i2c_mcu: mcu
i2c_bus: i2c3a
i2c_speed: 400000

# Probe-to-nozzle offset (mm). Measure carefully!
# These MUST be non-zero (unless allow_unsafe: True).
x_offset: -38.0
y_offset: -22.0

# Tap detection mode: "butter" (recommended) or "wma"
tap_mode: butter

# Tap threshold -- determines sensitivity of touch detection.
# Use PROBE_EDDY_NG_CALIBRATE_THRESHOLD to find the optimal value!
# Default 250 for butter mode, 1000 for wma mode.
#tap_threshold: 250.0

# Tap speed in mm/s. Slower = more precise, faster = quicker.
#tap_speed: 3.0

# Number of consistent tap samples and maximum attempts.
#tap_samples: 3
#tap_max_samples: 5
#tap_samples_stddev: 0.020

# Debug logging (set to False to reduce log noise once everything works)
#debug: True


# ============================================================================
# Z HOMING VIA EDDY PROBE
# ============================================================================

[stepper_z]
# ... your existing stepper_z config ...
endstop_pin: probe:z_virtual_endstop
# Comment out or remove any position_endstop line:
#position_endstop: 0
homing_speed: 5
position_min: -2    # Allow slight negative Z for tap target


# ============================================================================
# BED MESH
# ============================================================================

[bed_mesh]
speed: 200
horizontal_move_z: 3
mesh_min: 30, 30
mesh_max: 320, 320
probe_count: 15, 15
algorithm: bicubic


# ============================================================================
# SAFE Z HOME
# ============================================================================
# NOTE: [safe_z_home] and [homing_override] CANNOT coexist!
# If your setup (e.g. toolchanger) already defines [homing_override],
# do NOT include this section. Handle Z homing in your [homing_override] instead.

[safe_z_home]
home_xy_position: 175, 175
speed: 100
z_hop: 10
z_hop_speed: 10


# ============================================================================
# MACROS
# ============================================================================

# Print start macro with proper tap workflow.
# Call from your slicer's start G-Code:
#   PRINT_START BED_TEMP=60 EXTRUDER_TEMP=200
[gcode_macro PRINT_START]
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(200)|float %}

    # Home all axes
    G28

    # Heat bed and wait
    M190 S{bed_temp}

    # Warm nozzle to 150C (no oozing, no build plate damage)
    M109 S150

    # Precise Z offset via tap at print temperature
    PROBE_EDDY_NG_TAP

    # Temperature-compensated bed mesh
    BED_MESH_CALIBRATE

    # Full nozzle temperature
    M109 S{extruder_temp}

    # Ready to print
    G0 Z5 F3000


# ============================================================================
# EXAMPLE: BTT EDDY DUO VIA USB
# ============================================================================
# Uncomment and adjust if using an Eddy Duo connected via USB.

#[mcu eddy_duo]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXXXXX-if00

#[probe_eddy_ng my_eddy]
#sensor_type: btt_eddy
#i2c_mcu: eddy_duo
#i2c_bus: i2c0e
#x_offset: -38.0
#y_offset: -22.0


# ============================================================================
# EXAMPLE: BTT EDDY DUO VIA CAN BUS
# ============================================================================
# Uncomment and adjust if using an Eddy Duo connected via CAN bus.
# Note: CAN-connected Eddy Duo typically uses i2c0f (not i2c0e like USB).

#[mcu eddy_duo]
#canbus_uuid: XXXXXXXXXXXX

#[probe_eddy_ng my_eddy]
#sensor_type: btt_eddy
#i2c_mcu: eddy_duo
#i2c_bus: i2c0f
#x_offset: -38.0
#y_offset: -22.0


# ============================================================================
# EXAMPLE: CARTOGRAPHER VIA CAN BUS
# ============================================================================
# Uncomment and adjust if using a Cartographer probe via CAN bus.
# The Cartographer has its own MCU -- no firmware flashing needed.

#[mcu cartographer]
#canbus_uuid: XXXXXXXXXXXX

#[probe_eddy_ng my_eddy]
#sensor_type: cartographer
#i2c_mcu: cartographer
#i2c_bus: i2c0f
#x_offset: 0.0
#y_offset: 16.0


# ============================================================================
# EXAMPLE: ADVANCED CONFIGURATION
# ============================================================================
# Full-featured config with all advanced options. Uncomment what you need.

#[probe_eddy_ng my_eddy]
#sensor_type: btt_eddy
#i2c_mcu: eddy_duo
#i2c_bus: i2c0e
#x_offset: -38.0
#y_offset: -22.0
#
## Mesh path algorithm: snake, alternating_snake, spiral, random
#mesh_path: alternating_snake
## Primary direction for snake paths: x or y
#mesh_direction: x
## Number of scan passes (>1 = median averaging for higher accuracy)
#mesh_runs: 2
## Scanning height above bed (mm)
#mesh_height: 3.0
#
## Z-axis backlash compensation (measure with PROBE_EDDY_NG_ESTIMATE_BACKLASH)
#z_backlash: 0.015
#
## Alpha-beta tracking filter for measurement smoothing
## alpha: 0.0 = heavy smoothing, 1.0 = no smoothing
## beta: small = slow velocity tracking (more stable, less responsive)
#filter_alpha: 0.6
#filter_beta: 1e-5
#
## Temperature compensation (auto-saved by PROBE_EDDY_NG_TEMPERATURE_CALIBRATE)
## temperature_compensation: (auto-saved, do not edit manually)


# ============================================================================
# EXAMPLE: AXIS TWIST COMPENSATION
# ============================================================================
# If your gantry has twist, configure this section. eddy-ng will automatically
# apply the correction during bed mesh scanning.
#
# Calibrate automatically using tap (no manual probing needed!):
#   PROBE_EDDY_NG_AXIS_TWIST_CALIBRATE
#   SAVE_CONFIG
#
# Or use the macro: EDDY_NG_AXIS_TWIST_CALIBRATE (homes + calibrates + saves)
#
# Parameters: START_X, END_X, Y, SAMPLE_COUNT (default 7)

#[axis_twist_compensation]
#calibrate_start_x: 30
#calibrate_end_x: 320
#calibrate_y: 175


